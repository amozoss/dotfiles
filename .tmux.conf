unbind -n Tab

# to debug use: display-message

# True color / GUI (Vim :termguicolors, etc.) — forward RGB to outer terminal
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -as terminal-features ",xterm-256color:RGB"

# Forward TERM_GUI_COLORS from the attaching client into new tmux sessions (SSH from Termux, etc.).
# Pair with ~/.ssh SendEnv / sshd AcceptEnv plus `export TERM_GUI_COLORS=1` on the Termux side.
set -ga update-environment " TERM_GUI_COLORS"
# Seed global tmux env so show-environment -g and early if-shell sees it when the daemon inherited it from the spawning shell.
run-shell '[ "$TERM_GUI_COLORS" = 1 ] && tmux set-environment -Fg TERM_GUI_COLORS 1'

# Smart pane switching with awareness of Vim splits and fzf.
# See: https://github.com/christoomey/vim-tmux-navigator
# https://github.com/junegunn/fzf/pull/582#issuecomment-377731826
not_tmux="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(g?(view|n?vim?x?)(diff)?|fzf)$'"
bind -n 'C-h' if-shell "$not_tmux" "send-keys C-h"  "select-pane -L"
bind -n 'C-j' if-shell "$not_tmux" "send-keys C-j"  "select-pane -D"
bind -n 'C-k' if-shell "$not_tmux" "send-keys C-k"  "select-pane -U"
bind -n 'C-l' if-shell "$not_tmux" "send-keys C-l"  "select-pane -R"
bind -n 'C-\' if-shell "$not_tmux" "send-keys C-\\" "select-pane -l"

# resize panes like vim
bind < resize-pane -L 20
bind > resize-pane -R 20
bind - resize-pane -D 20
bind + resize-pane -U 20

# Status bar: Solarized-ish on macOS — SSH clients (e.g. Termux without SendEnv) often omit TERM_GUI_COLORS.
# Else require TERM_GUI_COLORS=1 (session or global) so Ubuntu/Linux SSH stays gated as before.
if-shell 'uname -s | grep -qx Darwin || (tmux show-environment TERM_GUI_COLORS 2>/dev/null; tmux show-environment -g TERM_GUI_COLORS 2>/dev/null) | grep -q "^TERM_GUI_COLORS=1$"' \
  "set -g status-style 'fg=colour244,bg=colour235' \;\
   set -g message-style 'fg=colour244,bg=colour235' \;\
   set -g message-command-style 'fg=colour244,bg=colour235' \;\
   set -g mode-style 'fg=colour235,bg=colour33' \;\
   set -g window-status-style 'fg=colour244,bg=colour235' \;\
   set -g window-status-current-style 'fg=colour235,bg=colour33' \;\
   set -g window-status-activity-style 'fg=colour166,bg=colour235' \;\
   set -g window-status-separator ' ' \;\
   set -g window-status-format '#[fg=colour244,bg=colour235] #I:#W ' \;\
   set -g window-status-current-format '#[fg=colour235,bg=colour33,bold] #I:#W ' \;\
   set -g pane-border-style 'fg=colour240' \;\
   set -g pane-active-border-style 'fg=colour33' \;\
   set -g status-left-length 60 \;\
   set -g status-right-length 80 \;\
   set -g status-left '#[fg=colour235,bg=colour64,bold] #S #[fg=colour244,bg=colour235,nobold]' \;\
   set -g status-right ''" \
  "set -g status-style 'fg=default,bg=default' \;\
   set -g message-style 'fg=default,bg=default' \;\
   set -g message-command-style 'fg=default,bg=default' \;\
   set -g mode-style 'fg=default,bg=default' \;\
   set -g window-status-style 'fg=default,bg=default' \;\
   set -g window-status-current-style 'fg=default,bg=default' \;\
   set -g window-status-activity-style 'fg=default,bg=default' \;\
   set -g pane-border-style 'fg=default' \;\
   set -g pane-active-border-style 'fg=default' \;\
   set -g status-left '#S' \;\
   set -g status-right '' \;\
   set -g window-status-separator ' ' \;\
   set -g window-status-format '#I:#W' \;\
   set -g window-status-current-format '#I:#W'"
